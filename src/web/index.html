<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Restore theme immediately to prevent FOUC
      // Must run before any CSS paints the page
      // Keep theme list in sync with THEMES in src/web/hooks/use-theme.ts
      try {
        var t = localStorage.getItem('theme');
        if (t && t !== 'default' && ['events','grimdark','tech'].includes(t)) {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch(e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>AI Site Starter</title>
    <meta name="description" content="Full-stack starter kit with Cloudflare Workers, React, and Better Auth." />
    <meta property="og:title" content="AI Site Starter" />
    <meta property="og:description" content="Full-stack starter kit with Cloudflare Workers, React, and Better Auth." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
